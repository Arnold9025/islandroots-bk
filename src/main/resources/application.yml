spring:
  application:
    name: island-roots-bk
  
  datasource:
    url: jdbc:postgresql://localhost:5433/islandroots
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update # Utilise "update" pour la gération automatique des tables en dev
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  max-http-header-size: 65536

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
