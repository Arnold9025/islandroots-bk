steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/islandroots-bk', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/islandroots-bk']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'islandroots-bk'
      - '--image'
      - 'gcr.io/$PROJECT_ID/islandroots-bk'
      - '--region'
      - 'europe-west1'

images:
  - 'gcr.io/$PROJECT_ID/islandroots-bk'

options:
  logging: CLOUD_LOGGING_ONLY
