steps:
  # Étape 1 : Construire l'image Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/islandroots-bk', '.']

  # Étape 2 : Pousser l'image vers Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/islandroots-bk']

  # Étape 3 : Déployer sur Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'islandroots-bk'
      - '--image'
      - 'gcr.io/$PROJECT_ID/islandroots-bk'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/islandroots-bk'

options:
  logging: CLOUD_LOGGING_ONLY
